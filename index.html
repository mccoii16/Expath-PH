<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Home | Expath Philippines</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/7tPKwq62/Colored.png" />
    <script>
      // Fix for formdata-polyfill trying to overwrite window.fetch which is a getter-only in some environments
      (function() {
        try {
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && !descriptor.writable && !descriptor.set && descriptor.configurable) {
            Object.defineProperty(window, 'fetch', {
              value: window.fetch,
              writable: true,
              configurable: true
            });
          }
        } catch (e) {
          console.error("Error fixing fetch descriptor:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
